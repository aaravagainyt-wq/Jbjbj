<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PvP Tiers | Leaderboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        :root {
            --bg-dark: #0f1015;
            --bg-card: #1c1d24;
            --bg-card-hover: #252630;
            --primary: #8a2be2;
            --primary-hover: #9d4edd;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            
            /* Tier Colors */
            --grandmaster: #ff4747;
            --master: #ff007f;
            --diamond: #00e5ff;
            --gold: #ffb700;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        /* Header & Nav */
        header {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--bg-card);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-main);
        }

        .logo span {
            color: var(--primary);
        }

        .add-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4);
        }

        .add-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(138, 43, 226, 0.6);
        }

        /* Leaderboard Container */
        .leaderboard {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* Player Card */
        .player-card {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            transition: background-color 0.2s ease, transform 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .player-card:hover {
            background-color: var(--bg-card-hover);
            transform: scale(1.01);
        }

        .rank-number {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-muted);
            width: 50px;
        }

        .player-card.rank-1 .rank-number {
            color: var(--gold);
        }

        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            margin-right: 1.5rem;
            background-color: #2a2a35;
            image-rendering: pixelated; /* Keeps MC skins sharp */
        }

        .player-info {
            flex-grow: 1;
        }

        .player-name {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        .tier-badge {
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Tier Specific Styles */
        .tier-GrandMaster { color: var(--grandmaster); background-color: rgba(255, 71, 71, 0.1); border: 1px solid var(--grandmaster); }
        .tier-Master { color: var(--master); background-color: rgba(255, 0, 127, 0.1); border: 1px solid var(--master); }
        .tier-Diamond { color: var(--diamond); background-color: rgba(0, 229, 255, 0.1); border: 1px solid var(--diamond); }
        .tier-Gold { color: var(--gold); background-color: rgba(255, 183, 0, 0.1); border: 1px solid var(--gold); }

        /* Modal Styles */
        .modal {
            display: none; 
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background-color: var(--bg-card);
            padding: 2.5rem;
            border-radius: 16px;
            max-width: 450px;
            text-align: center;
            position: relative;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            color: var(--text-muted);
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
        }

        .close-btn:hover {
            color: white;
        }

        .modal h2 {
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .modal p {
            color: var(--text-muted);
            line-height: 1.6;
        }

        .discord-tag {
            display: inline-block;
            background-color: #5865F2; /* Discord Color */
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: bold;
            margin: 1.5rem 0;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

    </style>
</head>
<body>

    <header>
        <div class="logo">PvP<span>Tiers</span></div>
        <button class="add-btn" id="openModalBtn" title="Get Enlisted">+</button>
    </header>

    <div class="leaderboard" id="leaderboard">
        </div>

    <div id="enlistModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeModalBtn">&times;</span>
            <h2>Want to get ranked?</h2>
            <p>To be enlisted on the leaderboard based on your PvP skills, add the Discord tag below and send him your best PvP video!</p>
            <div class="discord-tag">robloxbaconfr</div>
            <p style="font-size: 0.85rem;">He will review your footage and place you in the appropriate tier.</p>
        </div>
    </div>

    <script>
        // --- ADD YOUR PLAYERS HERE ---
        // You can change the order, names, and tiers from this script.
        // Valid Tiers: "GrandMaster", "Master", "Diamond", "Gold"
        const playersData = [
            { name: "DeadloxGmZz", tier: "Master" },
            { name: "Technoblade", tier: "GrandMaster" },
            { name: "Dream", tier: "Diamond" },
            { name: "Fruitberries", tier: "GrandMaster" },
            { name: "Wisp", tier: "Gold" },
            { name: "SomeRandomNoob123", tier: "Gold" } // Example of a user without a custom skin
        ];

        // Function to rank them (Putting DeadloxGmZz at #1 manually as requested)
        function sortPlayers() {
            // Find DeadloxGmZz and remove him from the array temporarily
            const deadloxIndex = playersData.findIndex(p => p.name.toLowerCase() === "deadloxgmzz");
            let deadlox = null;
            if (deadloxIndex !== -1) {
                deadlox = playersData.splice(deadloxIndex, 1)[0];
            }

            // You can add logic here to sort the rest of the players by tier if you want.
            // For now, it just keeps the order they are typed in the array.

            // Put DeadloxGmZz back at the very beginning (Index 0 / Rank 1)
            if (deadlox) {
                playersData.unshift(deadlox);
            }
        }

        // Render the Leaderboard
        function renderLeaderboard() {
            const container = document.getElementById('leaderboard');
            container.innerHTML = ''; // Clear existing

            sortPlayers();

            playersData.forEach((player, index) => {
                const rank = index + 1;
                
                // Fetching skins using Minotar API (Gets the 3D bust of the player)
                // If the player doesn't exist, the onerror event falls back to the classic Steve skin.
                const skinUrl = `https://minotar.net/armor/bust/${player.name}/100.png`;
                const fallbackSkin = `https://minotar.net/armor/bust/MHF_Steve/100.png`;

                const card = document.createElement('div');
                card.className = `player-card ${rank === 1 ? 'rank-1' : ''}`;
                
                card.innerHTML = `
                    <div class="rank-number">#${rank}</div>
                    <img class="avatar" src="${skinUrl}" alt="${player.name}'s skin" onerror="this.onerror=null; this.src='${fallbackSkin}';">
                    <div class="player-info">
                        <div class="player-name">${player.name}</div>
                        <div class="tier-badge tier-${player.tier}">${player.tier}</div>
                    </div>
                `;
                
                container.appendChild(card);
            });
        }

        // Modal Logic
        const modal = document.getElementById('enlistModal');
        const openBtn = document.getElementById('openModalBtn');
        const closeBtn = document.getElementById('closeModalBtn');

        openBtn.addEventListener('click', () => {
            modal.classList.add('show');
        });

        closeBtn.addEventListener('click', () => {
            modal.classList.remove('show');
        });

        // Close modal if user clicks outside of it
        window.addEventListener('click', (event) => {
            if (event.target === modal) {
                modal.classList.remove('show');
            }
        });

        // Initialize the website
        renderLeaderboard();
    </script>
</body>
</html>
