<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PvP Tiers | Minecraft Leaderboard</title>
    
    <script src="https://cdn.jsdelivr.net/npm/skinview3d@3.0.0/bundles/skinview3d.bundle.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        :root {
            --bg-dark: #0f1015;
            --bg-card: #1c1d24;
            --bg-card-hover: #252630;
            --primary: #8a2be2;
            --primary-hover: #9d4edd;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            
            --grandmaster: #ff4747;
            --master: #ff007f;
            --diamond: #00e5ff;
            --gold: #ffb700;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-dark); color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 2rem 1rem; overflow-x: hidden;
            position: relative;
        }

        /* The Cinematic Canvas */
        #particleCanvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; pointer-events: none;
        }

        header {
            width: 100%; max-width: 800px; display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 1.5rem; padding-bottom: 1rem;
            border-bottom: 2px solid rgba(28, 29, 36, 0.8);
            z-index: 1;
        }

        .logo { font-size: 1.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        .logo span { color: var(--primary); }

        .add-btn {
            background-color: var(--primary); color: white; border: none; border-radius: 50%;
            width: 45px; height: 45px; font-size: 1.5rem; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            transition: all 0.3s ease; box-shadow: 0 0 15px rgba(138, 43, 226, 0.4);
        }
        .add-btn:hover { transform: scale(1.1); box-shadow: 0 0 25px rgba(138, 43, 226, 0.8); }

        .controls {
            width: 100%; max-width: 800px; display: flex; flex-wrap: wrap; gap: 1rem;
            margin-bottom: 2rem; justify-content: space-between; z-index: 1;
        }

        .search-bar {
            flex-grow: 1; padding: 0.8rem 1rem; border-radius: 8px; border: 1px solid #333;
            background-color: rgba(28, 29, 36, 0.8); backdrop-filter: blur(5px);
            color: white; font-size: 1rem; outline: none; transition: 0.3s ease;
        }
        .search-bar:focus { border-color: var(--primary); }

        .leaderboard {
            width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 1rem; z-index: 1;
        }

        /* Cascade Load Animation */
        @keyframes slideInFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .player-card {
            background-color: rgba(28, 29, 36, 0.85); backdrop-filter: blur(10px);
            border-radius: 12px; padding: 1rem 1.5rem;
            display: flex; flex-direction: column; position: relative; overflow: hidden;
            cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.05); opacity: 0; 
            animation: slideInFade 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        /* Cursor Glow */
        .player-card::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 12px; background: radial-gradient( 600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255, 255, 255, 0.08), transparent 40% );
            z-index: 0; opacity: 0; transition: opacity 0.3s ease; pointer-events: none;
        }
        .player-card:hover::before { opacity: 1; }

        /* GrandMaster Animation Border */
        .player-card.anim-border-GrandMaster { background-clip: padding-box; position: relative; }
        .player-card.anim-border-GrandMaster::after {
            content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--grandmaster), transparent, var(--grandmaster));
            z-index: -1; border-radius: 14px; animation: animateBorder 3s linear infinite;
        }
        @keyframes animateBorder { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

        .card-header { display: flex; align-items: center; z-index: 1; }
        .rank-number { font-size: 1.5rem; font-weight: 800; color: var(--text-muted); width: 50px; }
        .player-card.rank-1 .rank-number { color: var(--gold); text-shadow: 0 0 10px rgba(255, 183, 0, 0.5); }
        .player-card.rank-2 .rank-number { color: silver; text-shadow: 0 0 10px rgba(192, 192, 192, 0.5); }

        .avatar {
            width: 60px; height: 60px; border-radius: 8px; margin-right: 1.5rem;
            background-color: #2a2a35; image-rendering: pixelated; z-index: 1;
        }

        .player-info { flex-grow: 1; z-index: 1; display: flex; flex-direction: column; gap: 0.3rem; }
        .name-wrapper { display: flex; align-items: center; gap: 0.8rem; }
        .player-name { font-size: 1.2rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
        
        /* Tier and League Badges */
        .tier-badge { display: inline-block; padding: 0.2rem 0.8rem; border-radius: 20px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; }
        .tier-GrandMaster { color: var(--grandmaster); background-color: rgba(255, 71, 71, 0.1); border: 1px solid var(--grandmaster); }
        .tier-Master { color: var(--master); background-color: rgba(255, 0, 127, 0.1); border: 1px solid var(--master); }
        .tier-Diamond { color: var(--diamond); background-color: rgba(0, 229, 255, 0.1); border: 1px solid var(--diamond); }
        .tier-Gold { color: var(--gold); background-color: rgba(255, 183, 0, 0.1); border: 1px solid var(--gold); }

        .league-container { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.1rem; }
        .league-badge {
            font-size: 0.65rem; padding: 0.2rem 0.5rem; border-radius: 4px;
            font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1);
        }
        .league-badge.ht { color: #ff4747; border-color: rgba(255, 71, 71, 0.4); background: rgba(255, 71, 71, 0.1); }
        .league-badge.lt { color: #00e5ff; border-color: rgba(0, 229, 255, 0.4); background: rgba(0, 229, 255, 0.1); }

        /* Expanded Details & 3D Viewer */
        .card-details {
            max-height: 0; overflow: hidden; transition: max-height 0.5s ease, margin-top: 0.3s ease, opacity 0.3s ease;
            opacity: 0; z-index: 1; display: flex; flex-direction: row; gap: 1rem; border-top: 1px solid transparent; justify-content: space-between;
        }
        .player-card.expanded .card-details {
            max-height: 300px; margin-top: 1rem; padding-top: 1rem; opacity: 1; border-top: 1px solid rgba(255,255,255,0.1);
        }
        .stats-col { flex-grow: 1; display: flex; flex-direction: column; gap: 0.8rem; }
        .model-col { width: 120px; height: 160px; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.3); border-radius: 8px; }

        .detail-row { display: flex; justify-content: space-between; font-size: 0.9rem; align-items: center;}
        .detail-label { color: var(--text-muted); font-weight: 600; }
        .detail-value { color: white; }
        .yt-link { color: #ff0000; text-decoration: none; font-weight: bold; }
        .yt-link:hover { text-decoration: underline; }
        
        .montage-quote { font-style: italic; color: var(--primary); background-color: rgba(138, 43, 226, 0.1); padding: 0.5rem; border-radius: 8px; margin-top: 0.5rem; text-align: center; }

        /* Share Button */
        .share-btn {
            background-color: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2);
            padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; align-self: flex-start;
        }
        .share-btn:hover { background-color: var(--primary); border-color: var(--primary); }

        /* Modal Styles Updated */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px); align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background-color: var(--bg-card); padding: 2.5rem; border-radius: 16px; max-width: 450px; text-align: center; position: relative; border: 1px solid #333; }
        .close-btn { position: absolute; top: 15px; right: 20px; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; }
        
        /* New Discord Button Styling */
        .discord-link-btn {
            display: inline-block; background-color: #5865F2; color: white; padding: 0.8rem 1.5rem; border-radius: 8px;
            font-weight: bold; margin: 1.5rem 0; font-size: 1.2rem; text-decoration: none;
            transition: background-color 0.3s ease, transform 0.2s ease; box-shadow: 0 4px 15px rgba(88, 101, 242, 0.3);
        }
        .discord-link-btn:hover { background-color: #4752C4; transform: scale(1.05); }

    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <header>
        <div class="logo">PvP<span>Tiers</span></div>
        <button class="add-btn" id="openModalBtn" title="Get Enlisted">+</button>
    </header>

    <div class="controls">
        <input type="text" id="searchInput" class="search-bar" placeholder="Search for a Minecraft player...">
    </div>

    <div class="leaderboard" id="leaderboard"></div>

    <div id="enlistModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeModalBtn">&times;</span>
            <h2>Want to get ranked?</h2>
            <p>Join our official Discord server and submit your best PvP video to get reviewed and placed on the leaderboard!</p>
            <a href="https://discord.gg/fh4n5SgKW9" target="_blank" class="discord-link-btn">Join Discord</a>
        </div>
    </div>

    <script>
        // --- CINEMATIC PARTICLE BACKGROUND ---
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray = [];
        let mouse = { x: null, y: null, radius: 150 };

        window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });
        window.addEventListener('mouseout', () => { mouse.x = undefined; mouse.y = undefined; });
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; initParticles(); });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x < 0 || this.x > canvas.width) this.speedX = -this.speedX;
                if (this.y < 0 || this.y > canvas.height) this.speedY = -this.speedY;

                if (mouse.x != null) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < mouse.radius) {
                        const force = (mouse.radius - distance) / mouse.radius;
                        this.x -= (dx / distance) * force * 3;
                        this.y -= (dy / distance) * force * 3;
                    }
                }
            }
            draw() {
                ctx.fillStyle = 'rgba(138, 43, 226, 0.8)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 12000;
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function connectParticles() {
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let dx = particlesArray[a].x - particlesArray[b].x;
                    let dy = particlesArray[a].y - particlesArray[b].y;
                    let distance = dx * dx + dy * dy;
                    if (distance < 10000) {
                        let opacityValue = 1 - (distance / 10000);
                        ctx.strokeStyle = `rgba(138, 43, 226, ${opacityValue * 0.3})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            connectParticles();
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();


        // --- SYNTHESIZED SOUND EFFECTS ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playHoverSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.05);
            gainNode.gain.setValueAtTime(0.015, audioCtx.currentTime); 
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        function playClickSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime); 
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // --- API CONNECTION ---
        // Your actual Hugging Face Direct URL
        const API_URL = "https://lord123hh-jsueuxbjxk.hf.space/api/players"; 

        let playersData = [];
        const quotes = ["\"Didn't even break a sweat.\"", "\"Too slow. Try predicting my strafe.\"", "\"Another one bites the dust.\"", "\"Clip that!\""];

        async function fetchLiveLeaderboard() {
            try {
                const response = await fetch(API_URL);
                playersData = await response.json();
                renderLeaderboard(''); 
            } catch (error) {
                console.error("Error fetching leaderboard data:", error);
                document.getElementById('leaderboard').innerHTML = "<p style='text-align:center; color:#ff4747; font-weight:bold;'>Failed to load database. Check if your Hugging Face Space is currently running.</p>";
            }
        }

        function sortPlayers() {
            const getPlayer = (n) => {
                const idx = playersData.findIndex(p => p.name.toLowerCase() === n.toLowerCase());
                return idx !== -1 ? playersData.splice(idx, 1)[0] : null;
            };
            
            // This guarantees Deadlox and ProsAarav remain pinned to the top no matter what
            const p1 = getPlayer("deadloxgmzz");
            const p2 = getPlayer("prosaarav");

            if (p2) playersData.unshift(p2);
            if (p1) playersData.unshift(p1);
        }

        function renderLeaderboard(searchTerm = '') {
            const container = document.getElementById('leaderboard');
            container.innerHTML = ''; 

            sortPlayers();
            
            let visibleIndex = 0;

            playersData.forEach((player) => {
                if (searchTerm && !player.name.toLowerCase().includes(searchTerm.toLowerCase())) return;

                const rank = visibleIndex + 1;
                const skinUrl = `https://minotar.net/armor/bust/${player.name}/100.png`;
                const fallbackSkin = `https://minotar.net/armor/bust/MHF_Steve/100.png`;
                const borderClass = player.tier === "GrandMaster" ? "anim-border-GrandMaster" : "";
                const ytDisplay = player.yt !== "N/A" ? `<a href="https://youtube.com/${player.yt}" target="_blank" class="yt-link">▶ ${player.yt}</a>` : `<span class="detail-value">N/A</span>`;

                // Build Leagues HTML dynamically from the database
                let leaguesHtml = '';
                if (player.leagues) {
                    for (const [combat, rankValue] of Object.entries(player.leagues)) {
                        const badgeClass = rankValue.toLowerCase().includes('ht') ? 'ht' : 'lt';
                        leaguesHtml += `<span class="league-badge ${badgeClass}">${combat} ${rankValue}</span>`;
                    }
                }

                const card = document.createElement('div');
                card.className = `player-card ${borderClass} ${rank === 1 ? 'rank-1' : ''} ${rank === 2 ? 'rank-2' : ''}`;
                card.style.animationDelay = `${visibleIndex * 0.1}s`; 

                card.innerHTML = `
                    <div class="card-header">
                        <div class="rank-number">#${rank}</div>
                        <img class="avatar" src="${skinUrl}" alt="${player.name}" onerror="this.onerror=null; this.src='${fallbackSkin}';">
                        <div class="player-info">
                            <div class="name-wrapper">
                                <div class="player-name">${player.name}</div>
                                <div class="tier-badge tier-${player.tier}">${player.tier}</div>
                            </div>
                            <div class="league-container">
                                ${leaguesHtml}
                            </div>
                        </div>
                    </div>
                    <div class="card-details">
                        <div class="stats-col">
                            <div class="detail-row"><span class="detail-label">YouTube:</span>${ytDisplay}</div>
                            <div class="detail-row"><span class="detail-label">Bio:</span><span class="detail-value">${player.bio}</span></div>
                            <button class="share-btn">Share My Rank</button>
                            <div class="montage-quote">${quotes[Math.floor(Math.random() * quotes.length)]}</div>
                        </div>
                        <div class="model-col" id="model-${player.name}"></div>
                    </div>
                `;

                // SFX & Hover logic
                card.addEventListener('mouseenter', playHoverSound);

                // Expand and 3D Model Render Logic
                let skinRendered = false;
                card.addEventListener('click', () => {
                    playClickSound();
                    card.classList.toggle('expanded');
                    
                    if (card.classList.contains('expanded') && !skinRendered) {
                        try {
                            const canvasContainer = document.getElementById(`model-${player.name}`);
                            canvasContainer.innerHTML = '<canvas id="canvas-'+player.name+'"></canvas>';
                            
                            let viewer = new skinview3d.SkinViewer({
                                canvas: document.getElementById('canvas-'+player.name),
                                width: 120, height: 160,
                                skin: `https://minotar.net/skin/${player.name}`
                            });
                            
                            viewer.animations.add(skinview3d.WalkingAnimation);
                            viewer.autoRotate = true;
                            skinRendered = true;
                        } catch (e) {
                            console.log("Skin load failed.");
                        }
                    }
                });

                // Share Button Logic
                const shareBtn = card.querySelector('.share-btn');
                shareBtn.addEventListener('click', (e) => {
                    e.stopPropagation(); 
                    playHoverSound();
                    const textToShare = `I am Rank #${rank} (${player.tier}) on the official PvP Tiers! Can you beat me?`;
                    navigator.clipboard.writeText(textToShare);
                    shareBtn.innerText = "Copied to Clipboard!";
                    shareBtn.style.backgroundColor = "var(--primary)";
                    setTimeout(() => {
                        shareBtn.innerText = "Share My Rank";
                        shareBtn.style.backgroundColor = "rgba(255,255,255,0.1)";
                    }, 2000);
                });

                container.appendChild(card);
                visibleIndex++;
            });
        }

        // --- INTERACTIVE CURSOR ---
        document.getElementById('leaderboard').onmousemove = e => {
            for(const card of document.getElementsByClassName('player-card')) {
                const rect = card.getBoundingClientRect(), x = e.clientX - rect.left, y = e.clientY - rect.top;
                card.style.setProperty('--mouse-x', `${x}px`);
                card.style.setProperty('--mouse-y', `${y}px`);
            }
        };

        // --- SEARCH BAR ---
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => renderLeaderboard(e.target.value));

        // --- MODAL ---
        const modal = document.getElementById('enlistModal');
        document.getElementById('openModalBtn').onclick = () => modal.classList.add('show');
        document.getElementById('closeModalBtn').onclick = () => modal.classList.remove('show');
        window.onclick = (e) => { if (e.target === modal) modal.classList.remove('show'); };

        // BOOT UP THE DATABASE
        fetchLiveLeaderboard();
    </script>
</body>
</html>
